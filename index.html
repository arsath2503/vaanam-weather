<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaanam — வானம்</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=Noto+Sans+Tamil:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --ink:#12203A; --ink-soft:rgba(18,32,58,0.72);
    --paper:rgba(255,255,255,0.72); --paper-edge:rgba(255,255,255,0.88);
    --line:rgba(18,32,58,0.16); --accent:#E8895A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; background:#4A90D9;}
  body{ font-family:'Inter', sans-serif; color:var(--ink); min-height:100vh; overflow-x:hidden; }
  .tamil{ font-family:'Noto Sans Tamil', sans-serif; }

  #scene-container{ position:fixed; inset:0; z-index:0; }
  #scene-container canvas{ display:block; width:100%; height:100%; }

  #lightningFlash{ position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:1; }

  .grain{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    opacity:0.045; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .wrap{ position:relative; z-index:3; max-width:760px; margin:0 auto; padding: 48px 24px 80px; }

  .search-wrap{ position:relative; }
  .search-row{
    display:flex; gap:8px; align-items:center;
    background:linear-gradient(180deg, var(--paper-edge), var(--paper));
    backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid var(--line); border-radius:999px; padding:6px 6px 6px 20px;
    position:relative; z-index:3;
    box-shadow:0 12px 30px rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .search-row input{ flex:1; min-width:0; border:none; background:transparent; outline:none; font-family:'Inter'; font-size:15px; color:var(--ink); }
  .search-row input::placeholder{ color:var(--ink-soft); }
  .search-row button{ border:none; background:var(--ink); color:#fff; font-family:'Inter'; font-weight:600; font-size:14px; padding:10px 20px; border-radius:999px; cursor:pointer; transition:background .2s, transform .15s; }
  .search-row button:hover{ background:var(--accent); }
  .search-row button:active{ transform:scale(0.96); }
  .search-row button:focus-visible, .search-row input:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .locate-btn{ background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:18px; padding:6px; line-height:1; }
  .locate-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:6px;}

  .suggestions{
    position:absolute; top:calc(100% + 8px); left:0; right:0; z-index:2;
    background:linear-gradient(180deg, var(--paper-edge), var(--paper));
    backdrop-filter:blur(18px) saturate(1.3);
    border:1px solid var(--line); border-radius:18px; overflow:hidden;
    box-shadow:0 16px 36px rgba(0,0,0,0.16);
  }
  .suggestion-item{ display:flex; flex-direction:column; gap:1px; padding:11px 18px; cursor:pointer; text-align:left; border:none; border-bottom:1px solid var(--line); width:100%; font-family:'Inter'; background:none; }
  .suggestion-item:last-child{ border-bottom:none; }
  .suggestion-item:hover, .suggestion-item.active{ background:rgba(255,255,255,0.45); }
  .suggestion-item .s-name{ font-size:14px; font-weight:600; color:var(--ink); }
  .suggestion-item .s-sub{ font-size:12px; color:var(--ink-soft); }

  .hero{
    text-align:center; margin-top:60px; position:relative; padding:28px 20px 8px;
    background:radial-gradient(ellipse 70% 100% at 50% 30%, rgba(255,255,255,0.22), rgba(255,255,255,0) 72%);
    border-radius:32px;
  }
  .hero .temp, .hero .place, .hero .condition, .hero .stat .val{ text-shadow: 0 2px 18px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.5); }
  .place{ font-size:19px; font-weight:600; letter-spacing:0.3px; color:var(--ink); }
  .place .country{ font-weight:400; color:var(--ink-soft); }
  .temp{ font-family:'Fraunces', serif; font-weight:400; font-size:clamp(96px, 22vw, 168px); line-height:0.95; margin:8px 0 0; letter-spacing:-2px; }
  .temp sup{ font-size:0.32em; font-weight:300; top:-0.5em; }
  .condition{ font-size:17px; color:var(--ink-soft); margin-top:2px; }
  .mood{ margin-top:20px; font-size:15px; color:var(--ink-soft); font-style:italic; }
  .mood .ta{ font-style:normal; display:block; margin-bottom:2px; color:var(--ink); font-size:15px; }
  .stat-row{ display:flex; justify-content:center; gap:28px; margin-top:34px; flex-wrap:wrap; }
  .stat{ text-align:center; }
  .stat .val{ font-size:16px; font-weight:600; }
  .stat .lab{ font-size:11px; text-transform:uppercase; letter-spacing:0.8px; color:var(--ink-soft); margin-top:2px; }

  .panel{
    position:relative;
    background:linear-gradient(180deg, var(--paper-edge), var(--paper));
    backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid var(--line); border-radius:24px; padding:22px; margin-top:32px;
    box-shadow:0 14px 36px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.6);
  }
  .panel h2{ font-family:'Inter'; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--ink-soft); margin:0 0 16px; }
  .hourly-scroll{ display:flex; gap:0; overflow-x:auto; padding-bottom:4px; scrollbar-width:thin; }
  .hour{ flex:0 0 auto; width:64px; text-align:center; padding:6px 0; border-right:1px solid var(--line); }
  .hour:last-child{ border-right:none; }
  .hour .t{ font-size:11px; color:var(--ink-soft); }
  .hour .ic{ font-size:22px; margin:8px 0; }
  .hour .tmp{ font-size:14px; font-weight:600; }
  .days{ display:flex; flex-direction:column; }
  .day{ display:grid; grid-template-columns: 84px 1fr auto auto; align-items:center; gap:14px; padding:11px 2px; border-bottom:1px solid var(--line); font-size:14px; }
  .day:last-child{ border-bottom:none; }
  .day .dname{ font-weight:600; }
  .day .dic{ font-size:19px; text-align:center; }
  .day .range{ color:var(--ink-soft); font-variant-numeric:tabular-nums; }
  .day .lo{ color:var(--ink-soft); }
  .footer-note{ text-align:center; margin-top:30px; font-size:12px; color:var(--ink-soft); }
  .footer-note .ta{ font-family:'Noto Sans Tamil'; display:block; margin-bottom:4px; }
  .footer-note .signature{ display:block; margin-top:10px; font-weight:600; letter-spacing:0.4px; color:var(--ink); opacity:0.8; }
  .state-msg{ text-align:center; margin-top:60px; color:var(--ink-soft); font-size:14px; position:relative; z-index:3; }
  .hidden{ display:none !important; }
  @media (max-width:480px){ .stat-row{ gap:18px; } .day{ grid-template-columns: 66px 1fr auto auto; font-size:13px; } }
  @media (max-width:380px){
    .wrap{ padding:36px 16px 60px; }
    .search-row{ padding:4px 4px 4px 14px; gap:4px; }
    .search-row input{ font-size:14px; }
    .search-row button{ padding:9px 14px; font-size:13px; }
    .stat-row{ gap:12px; }
    .stat .val{ font-size:14px; }
    .temp{ font-size:clamp(76px, 24vw, 120px); }
  }
</style>
</head>
<body>

<div id="scene-container"></div>
<div id="lightningFlash"></div>
<div class="grain"></div>

<div class="wrap">
  <div class="search-wrap">
    <form class="search-row" id="searchForm" role="search" autocomplete="off">
      <button type="button" class="locate-btn" id="locateBtn" title="Use my location" aria-label="Use my current location">📍</button>
      <input type="text" id="cityInput" placeholder="Search a city — Chennai, Kuala Lumpur, Singapore…" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="suggestionsList">
      <button type="submit">Search</button>
    </form>
    <div class="suggestions hidden" id="suggestionsList"></div>
  </div>

  <div id="loadingMsg" class="state-msg">Building the sky over Chennai…</div>
  <div id="errorMsg" class="state-msg hidden"></div>

  <div id="content" class="hidden">
    <div class="hero">
      <div class="place"><span id="placeFlag"></span> <span id="placeName">—</span> <span class="country" id="placeCountry"></span></div>
      <div class="temp" id="tempMain">—<sup>°C</sup></div>
      <div class="condition" id="conditionText">—</div>
      <div class="mood">
        <span class="ta" id="moodTa"></span>
        <span id="moodEn"></span>
      </div>
      <div class="stat-row">
        <div class="stat"><div class="val" id="feelsLike">—</div><div class="lab">Feels like</div></div>
        <div class="stat"><div class="val" id="humidity">—</div><div class="lab">Humidity</div></div>
        <div class="stat"><div class="val" id="wind">—</div><div class="lab">Wind</div></div>
        <div class="stat"><div class="val" id="pressure">—</div><div class="lab">Pressure</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>Next hours</h2>
      <div class="hourly-scroll" id="hourlyScroll"></div>
    </div>

    <div class="panel">
      <h2>5-day outlook</h2>
      <div class="days" id="daysList"></div>
    </div>

    <div class="footer-note">
      <span class="ta">வானம் பார்த்து, நாள் திட்டமிடுங்கள்</span>
      Data from OpenWeatherMap · Vaanam · 3D scene by Three.js
      <span class="signature">Created by Arsath</span>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
(function(){
  const API_KEY = (window.OPENWEATHER_API_KEY || '').trim();

  /* ============================================================
     THREE.JS 3D SCENE
  ============================================================ */
  const container = document.getElementById('scene-container');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  renderer.setSize(window.innerWidth, window.innerHeight);
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 2000);
  camera.position.set(0, 10, 34);
  camera.lookAt(0, 8, 0);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  /* ---------- Sky dome (gradient shader) ---------- */
  const skyUniforms = {
    topColor:    { value: new THREE.Color(0x4A90D9) },
    bottomColor: { value: new THREE.Color(0xDCEBF7) },
    offset:      { value: 40 },
    exponent:    { value: 0.65 }
  };
  const skyGeo = new THREE.SphereGeometry(600, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: skyUniforms,
    vertexShader: `
      varying vec3 vWorldPosition;
      void main(){
        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPosition.xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform float offset;
      uniform float exponent;
      varying vec3 vWorldPosition;
      void main(){
        float h = normalize(vWorldPosition + vec3(0.0, offset, 0.0)).y;
        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h,0.0),exponent),0.0)), 1.0);
      }`,
    side: THREE.BackSide
  });
  const skyMesh = new THREE.Mesh(skyGeo, skyMat);
  scene.add(skyMesh);
  let targetTop = new THREE.Color(0x4A90D9);
  let targetBottom = new THREE.Color(0xDCEBF7);

  /* ---------- Lights ---------- */
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
  scene.add(ambientLight);
  const hemiLight = new THREE.HemisphereLight(0x8fa8c9, 0x1a2230, 0.5);
  scene.add(hemiLight);
  const sunLight = new THREE.DirectionalLight(0xfff3d6, 1.1);
  sunLight.position.set(60, 90, -40);
  scene.add(sunLight);
  let baseSunIntensity = 1.1;

  /* ---------- Sun / Moon ---------- */
  const celestialMat = new THREE.MeshBasicMaterial({ color: 0xfff6dc });
  const celestialMesh = new THREE.Mesh(new THREE.SphereGeometry(9, 24, 24), celestialMat);
  celestialMesh.position.set(70, 90, -220);
  scene.add(celestialMesh);
  const celestialGlow = new THREE.PointLight(0xfff0c8, 0.6, 400);
  celestialGlow.position.copy(celestialMesh.position);
  scene.add(celestialGlow);

  /* ---------- Stars ---------- */
  const starCount = 900;
  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(starCount*3);
  for(let i=0;i<starCount;i++){
    const r = 550;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI*0.5;
    starPos[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    starPos[i*3+1] = r*Math.cos(phi)*0.6 + 40;
    starPos[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
  const starMat = new THREE.PointsMaterial({ color:0xffffff, size:1.6, transparent:true, opacity:0 });
  const starPoints = new THREE.Points(starGeo, starMat);
  scene.add(starPoints);

  /* ---------- Ground + water ---------- */
  const groundMat = new THREE.MeshStandardMaterial({ color:0x28394B, roughness:0.95 });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000,1000), groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.y = 0;
  scene.add(ground);

  const waterGeo = new THREE.PlaneGeometry(200, 60, 40, 12);
  const waterMat = new THREE.MeshStandardMaterial({ color:0x3E5670, roughness:0.15, metalness:0.55, transparent:true, opacity:0.9 });
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.rotation.x = -Math.PI/2;
  water.position.set(0, 0.05, 26);
  scene.add(water);
  const waterBasePos = waterGeo.attributes.position.array.slice();

  // distant rolling hills
  const hillsGroup = new THREE.Group();
  const hillMat = new THREE.MeshStandardMaterial({ color:0x2E4258, roughness:1 });
  for(let i=0;i<6;i++){
    const hill = new THREE.Mesh(new THREE.SphereGeometry(40+Math.random()*30, 16, 12, 0, Math.PI*2, 0, Math.PI/2), hillMat);
    hill.position.set(-250 + i*100 + (Math.random()*30-15), -10, -140 - Math.random()*40);
    hill.scale.y = 0.4;
    hillsGroup.add(hill);
  }
  scene.add(hillsGroup);

  /* ---------- Region landmarks ---------- */
  const landmarkGroup = new THREE.Group();
  scene.add(landmarkGroup);
  const landmarkMat = new THREE.MeshStandardMaterial({ color:0x16232F, roughness:0.9 });

  function makePalmTree(x,z,scale){
    const g = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.55,7,6), landmarkMat);
    trunk.position.y = 3.5;
    g.add(trunk);
    for(let i=0;i<6;i++){
      const frond = new THREE.Mesh(new THREE.ConeGeometry(0.5, 4.2, 4), landmarkMat);
      frond.position.y = 7;
      frond.rotation.z = Math.PI/2.3;
      frond.rotation.y = (i/6)*Math.PI*2;
      frond.position.x = Math.cos((i/6)*Math.PI*2)*1.4;
      frond.position.z = Math.sin((i/6)*Math.PI*2)*1.4;
      g.add(frond);
    }
    g.position.set(x, 0, z);
    g.scale.setScalar(scale);
    return g;
  }
  function makeBuilding(x,z,w,h,d){
    const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), landmarkMat);
    m.position.set(x, h/2, z);
    return m;
  }
  function makeGopuram(x,z){
    const g = new THREE.Group();
    const levels = 6;
    for(let i=0;i<levels;i++){
      const s = 5 - i*0.7;
      const box = new THREE.Mesh(new THREE.BoxGeometry(s,2,s), landmarkMat);
      box.position.y = i*2 + 1;
      g.add(box);
    }
    g.position.set(x,0,z);
    return g;
  }
  function makeMinaretDome(x,z){
    const g = new THREE.Group();
    const tower = new THREE.Mesh(new THREE.CylinderGeometry(1.2,1.2,14,10), landmarkMat);
    tower.position.y = 7;
    const dome = new THREE.Mesh(new THREE.SphereGeometry(1.6,12,10,0,Math.PI*2,0,Math.PI/2), landmarkMat);
    dome.position.y = 14.6;
    g.add(tower, dome);
    g.position.set(x,0,z);
    return g;
  }
  function makePagoda(x,z){
    const g = new THREE.Group();
    for(let i=0;i<4;i++){
      const s = 4.5 - i*0.9;
      const roof = new THREE.Mesh(new THREE.ConeGeometry(s,1.4,4), landmarkMat);
      roof.position.y = i*2.6 + 1.5;
      roof.rotation.y = Math.PI/4;
      g.add(roof);
    }
    g.position.set(x,0,z);
    return g;
  }

  const REGION_MAP = {
    IN:'south_asia', LK:'south_asia', BD:'south_asia', NP:'south_asia', PK:'south_asia',
    MY:'se_asia', SG:'se_asia', TH:'se_asia', ID:'se_asia', PH:'se_asia', VN:'se_asia', KH:'se_asia', MM:'se_asia',
    AE:'middle_east', SA:'middle_east', QA:'middle_east', OM:'middle_east', KW:'middle_east', BH:'middle_east', EG:'middle_east',
    JP:'east_asia', CN:'east_asia', KR:'east_asia', TW:'east_asia', HK:'east_asia',
  };
  function regionFor(cc){ return REGION_MAP[(cc||'').toUpperCase()] || 'western'; }

  function buildLandmarks(region){
    while(landmarkGroup.children.length) landmarkGroup.remove(landmarkGroup.children[0]);
    landmarkGroup.scale.setScalar(1.8);
    if(region === 'south_asia'){
      landmarkGroup.add(makeGopuram(-6, -11));
      landmarkGroup.add(makeBuilding(-15,-13,4,7,4));
      landmarkGroup.add(makeBuilding(13,-12,5,9,4));
      landmarkGroup.add(makePalmTree(-10,-6,1));
      landmarkGroup.add(makePalmTree(9,-7,0.85));
      landmarkGroup.add(makePalmTree(17,-9,1.1));
      landmarkGroup.add(makePalmTree(-19,-10,0.9));
    } else if(region === 'se_asia'){
      landmarkGroup.add(makeBuilding(-4,-16,4,26,4));
      landmarkGroup.add(makeBuilding(4,-16,4,30,4));
      landmarkGroup.add(makeBuilding(15,-13,5,14,5));
      landmarkGroup.add(makePalmTree(-14,-6,1));
      landmarkGroup.add(makePalmTree(16,-5,0.9));
    } else if(region === 'middle_east'){
      landmarkGroup.add(makeMinaretDome(-4,-13));
      landmarkGroup.add(makeBuilding(-13,-13,5,10,5));
      landmarkGroup.add(makeBuilding(12,-14,5,12,5));
      landmarkGroup.add(makePalmTree(-17,-6,1));
      landmarkGroup.add(makePalmTree(17,-7,0.9));
    } else if(region === 'east_asia'){
      landmarkGroup.add(makePagoda(-6,-13));
      landmarkGroup.add(makeBuilding(-14,-15,5,20,5));
      landmarkGroup.add(makeBuilding(13,-16,5,24,5));
    } else {
      landmarkGroup.add(makeBuilding(-12,-14,5,14,5));
      landmarkGroup.add(makeBuilding(-4,-16,4,20,4));
      landmarkGroup.add(makeBuilding(5,-15,5,17,5));
      landmarkGroup.add(makeBuilding(13,-17,4,23,4));
    }
  }
  buildLandmarks('south_asia');

  /* ---------- Clouds ---------- */
  const cloudGroup = new THREE.Group();
  scene.add(cloudGroup);
  const cloudMat = new THREE.MeshStandardMaterial({ color:0xffffff, roughness:0.9, transparent:true, opacity:0.92, flatShading:false });

  function makeCloud(depth){
    const g = new THREE.Group();
    const puffs = 5 + Math.floor(Math.random()*3);
    const baseScale = 2.4 + depth*3.4;
    for(let i=0;i<puffs;i++){
      const s = baseScale * (0.6+Math.random()*0.6);
      const puff = new THREE.Mesh(new THREE.SphereGeometry(s, 10, 8), cloudMat);
      puff.position.set(i*baseScale*1.0 - puffs*baseScale*0.5, Math.random()*1.4, Math.random()*1.4);
      g.add(puff);
    }
    g.userData.speed = 0.4 + depth*1.2 + Math.random()*0.4;
    return g;
  }

  function rebuildClouds(coverPercent, windKmh){
    while(cloudGroup.children.length) cloudGroup.remove(cloudGroup.children[0]);
    if(coverPercent < 5) return;
    const count = Math.max(2, Math.min(14, Math.round(coverPercent/8)));
    for(let i=0;i<count;i++){
      const depth = Math.random();
      const cloud = makeCloud(depth);
      cloud.position.set(-150 + Math.random()*300, 55 + Math.random()*35, -60 - depth*140);
      cloud.userData.speed *= (0.5 + windKmh/40);
      cloudGroup.add(cloud);
    }
  }

  /* ---------- Rain ---------- */
  const RAIN_COUNT = 3500;
  const rainGeo = new THREE.BufferGeometry();
  const rainPos = new Float32Array(RAIN_COUNT*3);
  for(let i=0;i<RAIN_COUNT;i++){
    rainPos[i*3]   = (Math.random()-0.5)*260;
    rainPos[i*3+1] = Math.random()*140;
    rainPos[i*3+2] = (Math.random()-0.5)*260;
  }
  rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPos,3));
  const rainMat = new THREE.PointsMaterial({ color:0xBFD6E8, size:0.35, transparent:true, opacity:0, sizeAttenuation:true });
  const rainPoints = new THREE.Points(rainGeo, rainMat);
  scene.add(rainPoints);
  let rainActive = false;
  let rainSpeed = 60;
  let rainWindX = 0;

  /* ---------- Fog ---------- */
  scene.fog = new THREE.Fog(0xDCEBF7, 60, 500);

  /* ---------- Lightning ---------- */
  let lightningTimer = null;
  const boltMat = new THREE.LineBasicMaterial({ color:0xEAF2FF, transparent:true, opacity:0 });
  let boltMesh = null;
  const lightningFlashEl = document.getElementById('lightningFlash');

  function spawnBolt(){
    if(boltMesh) scene.remove(boltMesh);
    const pts = [];
    let x = (Math.random()-0.5)*80, y = 120;
    pts.push(new THREE.Vector3(x,y,-100));
    while(y > 20){
      y -= 8 + Math.random()*8;
      x += (Math.random()-0.5)*14;
      pts.push(new THREE.Vector3(x,y,-100));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    boltMesh = new THREE.Line(geo, boltMat);
    scene.add(boltMesh);
  }

  function startLightning(){
    stopLightning();
    function flash(){
      spawnBolt();
      boltMat.opacity = 1;
      sunLight.intensity = baseSunIntensity + 3.5;
      lightningFlashEl.style.transition = 'opacity 0.08s';
      lightningFlashEl.style.opacity = '0.7';
      setTimeout(()=>{
        lightningFlashEl.style.opacity = '0';
        boltMat.opacity = 0;
        sunLight.intensity = baseSunIntensity;
      }, 110);
    }
    function schedule(){
      const next = 4000 + Math.random()*9000;
      lightningTimer = setTimeout(()=>{ flash(); schedule(); }, next);
    }
    schedule();
  }
  function stopLightning(){
    if(lightningTimer){ clearTimeout(lightningTimer); lightningTimer = null; }
    lightningFlashEl.style.opacity = '0';
    boltMat.opacity = 0;
    sunLight.intensity = baseSunIntensity;
  }

  /* ---------- Mouse parallax (real 3D depth via camera) ---------- */
  let mouseX = 0, mouseY = 0;
  if(!reduceMotion){
    document.addEventListener('mousemove', e => {
      mouseX = (e.clientX / window.innerWidth - 0.5);
      mouseY = (e.clientY / window.innerHeight - 0.5);
    });
  }

  /* ---------- Scene configuration from weather data ---------- */
  function configureScene(group, isDay, windKmh, cloudCoverPct, rainActiveFlag, rainVolume, isStorm, isMist){
    const palettes = {
      clear_day:  { top:0x4A90D9, bottom:0xDCEBF7, fog:0xCFE3F3, sunI:1.15, amb:0.6, hemi:0.55, ground:0x28394B, hill:0x2E4258 },
      clear_night:{ top:0x0B1330, bottom:0x1B2144, fog:0x141C42, sunI:0.15, amb:0.3, hemi:0.4, ground:0x141E30, hill:0x1A2340 },
      cloud_day:  { top:0x7C93A8, bottom:0xDCE4EA, fog:0xB7C4CE, sunI:0.75, amb:0.55, hemi:0.5, ground:0x2B3A44, hill:0x6E828F },
      cloud_night:{ top:0x161F33, bottom:0x2C3652, fog:0x232D45, sunI:0.12, amb:0.28, hemi:0.38, ground:0x131A28, hill:0x20293C },
      mist_day:   { top:0x9AAAB4, bottom:0xE7ECEE, fog:0xD8DFE1, sunI:0.6, amb:0.55, hemi:0.5, ground:0x3C4A50, hill:0x8FA0A8 },
      mist_night: { top:0x232C38, bottom:0x48545F, fog:0x333F4B, sunI:0.1, amb:0.3, hemi:0.4, ground:0x1C2530, hill:0x2A3540 },
      rain_day:   { top:0x5B6B7D, bottom:0xA9B6C1, fog:0x8C99A6, sunI:0.55, amb:0.5, hemi:0.46, ground:0x222E38, hill:0x516070 },
      rain_night: { top:0x12182A, bottom:0x2A3245, fog:0x1D2438, sunI:0.1, amb:0.27, hemi:0.36, ground:0x121824, hill:0x1B2333 },
      storm_day:  { top:0x3E4A5C, bottom:0x7C8896, fog:0x5A6779, sunI:0.5, amb:0.45, hemi:0.42, ground:0x1A2129, hill:0x3A4552 },
      storm_night:{ top:0x0A0E1C, bottom:0x1E2438, fog:0x151A2C, sunI:0.08, amb:0.24, hemi:0.32, ground:0x0F141E, hill:0x161B28 },
      snow_day:   { top:0x9FB6C9, bottom:0xEEF4F8, fog:0xDCE7EC, sunI:0.9, amb:0.6, hemi:0.55, ground:0x465662, hill:0x9AAAB8 },
      snow_night: { top:0x1A2438, bottom:0x333F5A, fog:0x26314A, sunI:0.12, amb:0.3, hemi:0.4, ground:0x1C2636, hill:0x242E42 },
    };
    const key = `${isMist ? 'mist' : group}_${isDay?'day':'night'}`;
    const p = palettes[key] || palettes.clear_day;

    targetTop.set(p.top);
    targetBottom.set(p.bottom);
    scene.fog.color.set(p.fog);
    scene.fog.near = isMist ? 20 : 60;
    scene.fog.far = isMist ? 150 : 500;
    baseSunIntensity = p.sunI;
    sunLight.intensity = p.sunI;
    ambientLight.intensity = p.amb;
    hemiLight.intensity = p.hemi;
    hemiLight.groundColor.set(p.ground);
    groundMat.color.set(p.ground);
    hillMat.color.set(p.hill);
    waterMat.color.set(p.bottom).lerp(new THREE.Color(0x2A3A4C), 0.5);

    celestialMat.color.set(isDay ? 0xfff6dc : 0xe4e9f5);
    celestialGlow.color.set(isDay ? 0xfff0c8 : 0xc9d6ee);
    celestialGlow.intensity = isDay ? 0.6 : 0.35;
    celestialMesh.position.y = isDay ? 90 : 96;
    sunLight.position.set(70, celestialMesh.position.y, -220);

    starMat.opacity = isDay ? 0 : 0.9;

    rebuildClouds(group === 'clear' ? Math.min(cloudCoverPct,15) : Math.max(cloudCoverPct, isMist?45:25), windKmh);

    rainActive = rainActiveFlag;
    rainMat.opacity = rainActive ? 0.55 : 0;
    rainSpeed = 50 + (rainVolume ? Math.min(1,rainVolume/8)*50 : (isStorm?40:20));
    rainWindX = Math.max(-8, Math.min(8, (windKmh - 10) / 6));

    if(isStorm) startLightning(); else stopLightning();
  }

  /* ---------- Animation loop ---------- */
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(0.05, clock.getDelta());
    const t = clock.elapsedTime;

    skyUniforms.topColor.value.lerp(targetTop, 0.02);
    skyUniforms.bottomColor.value.lerp(targetBottom, 0.02);

    cloudGroup.children.forEach(c => {
      c.position.x += c.userData.speed * dt;
      if(c.position.x > 200) c.position.x = -200;
    });

    if(rainActive){
      const pos = rainGeo.attributes.position.array;
      for(let i=0;i<RAIN_COUNT;i++){
        pos[i*3+1] -= rainSpeed*dt;
        pos[i*3] += rainWindX*dt;
        if(pos[i*3+1] < 0){ pos[i*3+1] = 140; pos[i*3] = (Math.random()-0.5)*260; pos[i*3+2] = (Math.random()-0.5)*260; }
      }
      rainGeo.attributes.position.needsUpdate = true;
    }

    // water ripple
    const wPos = waterGeo.attributes.position.array;
    for(let i=0;i<wPos.length/3;i++){
      const bx = waterBasePos[i*3], bz = waterBasePos[i*3+2];
      wPos[i*3+1] = Math.sin(t*0.8 + bx*0.25) * 0.15 + Math.cos(t*0.6 + bz*0.3) * 0.1;
    }
    waterGeo.attributes.position.needsUpdate = true;
    waterGeo.computeVertexNormals();

    // star twinkle
    starMat.size = 1.4 + Math.sin(t*2)*0.2;

    // camera parallax (true 3D depth)
    camera.position.x += ((mouseX*6) - camera.position.x) * 0.03;
    camera.position.y += (10 - (mouseY*3) - camera.position.y) * 0.03;
    camera.lookAt(0, 8, -20);

    renderer.render(scene, camera);
  }
  animate();

  /* ============================================================
     WEATHER DATA + UI (same logic as before, now feeding the 3D scene)
  ============================================================ */

  const els = {
    form: document.getElementById('searchForm'),
    input: document.getElementById('cityInput'),
    suggestList: document.getElementById('suggestionsList'),
    locateBtn: document.getElementById('locateBtn'),
    loading: document.getElementById('loadingMsg'),
    error: document.getElementById('errorMsg'),
    content: document.getElementById('content'),
    placeName: document.getElementById('placeName'),
    placeFlag: document.getElementById('placeFlag'),
    placeCountry: document.getElementById('placeCountry'),
    tempMain: document.getElementById('tempMain'),
    conditionText: document.getElementById('conditionText'),
    moodTa: document.getElementById('moodTa'),
    moodEn: document.getElementById('moodEn'),
    feelsLike: document.getElementById('feelsLike'),
    humidity: document.getElementById('humidity'),
    wind: document.getElementById('wind'),
    pressure: document.getElementById('pressure'),
    hourlyScroll: document.getElementById('hourlyScroll'),
    daysList: document.getElementById('daysList')
  };

  let currentSuggestions = [];
  let activeSuggestionIdx = -1;
  let debounceTimer = null;

  function countryToFlag(cc){
    if(!cc || cc.length !== 2) return '';
    return cc.toUpperCase().replace(/./g, ch => String.fromCodePoint(127397 + ch.charCodeAt(0)));
  }

  function ownGroup(code){
    if(code >= 200 && code < 300) return {icon:'⛈️', group:'storm', label:'Thunderstorm'};
    if(code >= 300 && code < 400) return {icon:'🌦️', group:'rain', label:'Drizzle'};
    if(code >= 500 && code < 600) return {icon:'🌧️', group:'rain', label:'Rain'};
    if(code >= 600 && code < 700) return {icon:'🌨️', group:'snow', label:'Snow'};
    if(code >= 700 && code < 800) return {icon:'🌫️', group:'mist', label:'Mist/Haze'};
    if(code === 800) return {icon:'☀️', group:'clear', label:'Clear sky'};
    if(code > 800) return {icon:'☁️', group:'cloud', label:'Cloudy'};
    return {icon:'🌡️', group:'clear', label:'—'};
  }

  const MOODS = {
    clear_day:['இன்று வானம் தெளிவு', 'Clear skies — a good day to look up.'],
    clear_night:['நட்சத்திரங்கள் தெரியும் இரவு', 'A starlit night, calm and quiet.'],
    cloud_day:['மேகமூட்டமான நாள்', 'Soft grey light, easy on the eyes.'],
    cloud_night:['மேகமூடிய இரவு', 'Clouds hiding the stars tonight.'],
    mist_day:['பனிமூட்டம் சூழ்ந்த நாள்', 'A hazy day — the horizon softens.'],
    mist_night:['மூடுபனி இரவு', 'Mist rolling in over the quiet dark.'],
    rain_day:['மழை பொழியும் நாள்', 'Rain today — keep an umbrella close.'],
    rain_night:['மழை நிறைந்த இரவு', 'A rainy night, good for slow thoughts.'],
    storm_day:['இடி மின்னலுடன் மழை', 'Thunder in the air — stay indoors if you can.'],
    storm_night:['இடியுடன் கூடிய இரவு', 'A stormy night — best watched from inside.'],
    snow_day:['பனி பொழியும் நாள்', 'Snow falling — the world goes quiet.'],
    snow_night:['பனி நிறைந்த இரவு', 'A snowy night, soft and still.'],
  };

  function formatHour(unixSec, tzOffsetSec){
    const d = new Date((unixSec + tzOffsetSec) * 1000);
    let h = d.getUTCHours();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h===0) h = 12;
    return `${h}${ampm}`;
  }
  function formatDay(unixSec, tzOffsetSec, idx){
    if(idx===0) return 'Today';
    const d = new Date((unixSec + tzOffsetSec) * 1000);
    return d.toLocaleDateString('en-US', {weekday:'short', timeZone:'UTC'});
  }

  async function geocodeSearch(name, limit){
    const url = `https://api.openweathermap.org/geo/1.0/direct?q=${encodeURIComponent(name)}&limit=${limit}&appid=${API_KEY}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Geocoding failed');
    return res.json();
  }
  async function fetchCurrent(lat, lon){
    const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Current weather fetch failed');
    return res.json();
  }
  async function fetchForecast(lat, lon){
    const url = `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('Forecast fetch failed');
    return res.json();
  }

  function aggregateDaily(list, tzOffsetSec){
    const days = {};
    list.forEach(item => {
      const localDate = new Date((item.dt + tzOffsetSec) * 1000);
      const key = localDate.toISOString().slice(0,10);
      if(!days[key]) days[key] = { dt:item.dt, temps:[], middayCode:null, middayDiff:Infinity };
      days[key].temps.push(item.main.temp);
      const hour = localDate.getUTCHours();
      const diff = Math.abs(hour - 13);
      if(diff < days[key].middayDiff){ days[key].middayDiff = diff; days[key].middayCode = item.weather[0].id; }
    });
    return Object.keys(days).slice(0,5).map(key => {
      const d = days[key];
      return { dt: d.dt, max: Math.max(...d.temps), min: Math.min(...d.temps), code: d.middayCode };
    });
  }

  function render(place, current, forecast){
    els.placeName.textContent = place.name;
    els.placeCountry.textContent = place.country || '';
    els.placeFlag.textContent = countryToFlag(place.country);

    const tzOffset = current.timezone || 0;
    const code = current.weather[0].id;
    const info = ownGroup(code);
    const isDay = (current.dt > current.sys.sunrise && current.dt < current.sys.sunset);
    const windKmh = current.wind.speed * 3.6;
    const cover = current.clouds ? current.clouds.all : 0;
    const rainVol = current.rain ? (current.rain['1h'] || current.rain['3h'] || 0) : 0;
    const isMist = info.group === 'mist';
    const isStorm = info.group === 'storm';
    const rainActiveNow = info.group === 'rain' || info.group === 'storm';

    buildLandmarks(regionFor(place.country));
    configureScene(info.group, isDay, windKmh, cover, rainActiveNow, rainVol, isStorm, isMist);

    els.tempMain.innerHTML = `${Math.round(current.main.temp)}<sup>°C</sup>`;
    els.conditionText.textContent = `${info.icon} ${current.weather[0].description}`;
    els.feelsLike.textContent = `${Math.round(current.main.feels_like)}°`;
    els.humidity.textContent = `${current.main.humidity}%`;
    els.wind.textContent = `${Math.round(windKmh)} km/h`;
    els.pressure.textContent = `${current.main.pressure} hPa`;

    const moodKey = `${isMist?'mist':info.group}_${isDay?'day':'night'}`;
    const mood = MOODS[moodKey] || MOODS.clear_day;
    els.moodTa.textContent = mood[0];
    els.moodEn.textContent = mood[1];

    let hHtml = '';
    forecast.list.slice(0,8).forEach((item, i) => {
      const hInfo = ownGroup(item.weather[0].id);
      hHtml += `<div class="hour">
        <div class="t">${i===0 ? 'Now' : formatHour(item.dt, tzOffset)}</div>
        <div class="ic">${hInfo.icon}</div>
        <div class="tmp">${Math.round(item.main.temp)}°</div>
      </div>`;
    });
    els.hourlyScroll.innerHTML = hHtml;

    const daily = aggregateDaily(forecast.list, tzOffset);
    let dHtml = '';
    daily.forEach((d, i) => {
      const dInfo = ownGroup(d.code);
      dHtml += `<div class="day">
        <div class="dname">${formatDay(d.dt, tzOffset, i)}</div>
        <div class="dic">${dInfo.icon}</div>
        <div class="range">${Math.round(d.max)}°</div>
        <div class="lo">${Math.round(d.min)}°</div>
      </div>`;
    });
    els.daysList.innerHTML = dHtml;

    els.loading.classList.add('hidden');
    els.error.classList.add('hidden');
    els.content.classList.remove('hidden');
  }

  async function loadPlace(place){
    if(!API_KEY){
      els.loading.classList.add('hidden');
      els.error.textContent = 'No OpenWeatherMap API key found. See README for setup.';
      els.error.classList.remove('hidden');
      return;
    }
    els.loading.textContent = `Building the sky over ${place.name}…`;
    els.loading.classList.remove('hidden');
    els.error.classList.add('hidden');
    els.content.classList.add('hidden');
    try{
      const [current, forecast] = await Promise.all([fetchCurrent(place.lat, place.lon), fetchForecast(place.lat, place.lon)]);
      render(place, current, forecast);
    }catch(err){
      els.loading.classList.add('hidden');
      els.error.textContent = `Couldn't load weather for "${place.name}". Please try again.`;
      els.error.classList.remove('hidden');
    }
  }

  async function loadCityByName(name){
    if(!API_KEY){
      els.loading.classList.add('hidden');
      els.error.textContent = 'No OpenWeatherMap API key found. See README for setup.';
      els.error.classList.remove('hidden');
      return;
    }
    els.loading.textContent = `Building the sky over ${name}…`;
    els.loading.classList.remove('hidden');
    els.error.classList.add('hidden');
    els.content.classList.add('hidden');
    try{
      const results = await geocodeSearch(name, 1);
      if(!results.length) throw new Error('not found');
      const r = results[0];
      await loadPlace({ lat:r.lat, lon:r.lon, name:r.name, country:r.country || '' });
    }catch(err){
      els.loading.classList.add('hidden');
      els.error.textContent = `Couldn't find "${name}". Try a different spelling or a nearby larger city.`;
      els.error.classList.remove('hidden');
    }
  }

  async function loadCoords(lat, lon){
    if(!API_KEY){
      els.error.textContent = 'No OpenWeatherMap API key found. See README for setup.';
      els.error.classList.remove('hidden');
      return;
    }
    els.loading.textContent = `Building the sky above you…`;
    els.loading.classList.remove('hidden');
    els.error.classList.add('hidden');
    els.content.classList.add('hidden');
    try{
      const [current, forecast] = await Promise.all([fetchCurrent(lat, lon), fetchForecast(lat, lon)]);
      render({name: current.name || 'Your location', country: current.sys ? current.sys.country : ''}, current, forecast);
    }catch(err){
      els.loading.classList.add('hidden');
      els.error.textContent = `Couldn't load weather for your location.`;
      els.error.classList.remove('hidden');
    }
  }

  function renderSuggestions(results){
    currentSuggestions = results;
    activeSuggestionIdx = -1;
    if(!results.length){ els.suggestList.classList.add('hidden'); els.suggestList.innerHTML = ''; return; }
    els.suggestList.innerHTML = results.map((r, i) => {
      const sub = [r.state, r.country].filter(Boolean).join(', ');
      return `<button type="button" class="suggestion-item" data-idx="${i}">
        <span class="s-name">${r.name}</span>
        <span class="s-sub">${sub}</span>
      </button>`;
    }).join('');
    els.suggestList.classList.remove('hidden');
    els.input.setAttribute('aria-expanded', 'true');
  }
  function hideSuggestions(){
    els.suggestList.classList.add('hidden');
    els.suggestList.innerHTML = '';
    currentSuggestions = [];
    activeSuggestionIdx = -1;
    els.input.setAttribute('aria-expanded', 'false');
  }
  function pickSuggestion(idx){
    const r = currentSuggestions[idx];
    if(!r) return;
    els.input.value = `${r.name}${r.country ? ', ' + r.country : ''}`;
    hideSuggestions();
    loadPlace({ lat:r.lat, lon:r.lon, name:r.name, country:r.country || '' });
  }

  els.input.addEventListener('input', function(){
    const v = els.input.value.trim();
    clearTimeout(debounceTimer);
    if(v.length < 2){ hideSuggestions(); return; }
    debounceTimer = setTimeout(async () => {
      try{ const results = await geocodeSearch(v, 5); renderSuggestions(results); }
      catch(e){ hideSuggestions(); }
    }, 350);
  });
  els.input.addEventListener('keydown', function(e){
    if(els.suggestList.classList.contains('hidden')) return;
    const items = els.suggestList.querySelectorAll('.suggestion-item');
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      activeSuggestionIdx = Math.min(activeSuggestionIdx + 1, items.length - 1);
      items.forEach((it,i)=>it.classList.toggle('active', i===activeSuggestionIdx));
    } else if(e.key === 'ArrowUp'){
      e.preventDefault();
      activeSuggestionIdx = Math.max(activeSuggestionIdx - 1, 0);
      items.forEach((it,i)=>it.classList.toggle('active', i===activeSuggestionIdx));
    } else if(e.key === 'Enter'){
      if(activeSuggestionIdx >= 0){ e.preventDefault(); pickSuggestion(activeSuggestionIdx); }
    } else if(e.key === 'Escape'){ hideSuggestions(); }
  });
  els.suggestList.addEventListener('click', function(e){
    const btn = e.target.closest('.suggestion-item');
    if(!btn) return;
    pickSuggestion(parseInt(btn.dataset.idx, 10));
  });
  document.addEventListener('click', function(e){
    if(!e.target.closest('.search-wrap')) hideSuggestions();
  });
  els.form.addEventListener('submit', function(e){
    e.preventDefault();
    const v = els.input.value.trim();
    hideSuggestions();
    if(v) loadCityByName(v);
  });
  els.locateBtn.addEventListener('click', function(){
    if(!navigator.geolocation){
      els.error.textContent = 'Location access is not available in this browser.';
      els.error.classList.remove('hidden');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => loadCoords(pos.coords.latitude, pos.coords.longitude),
      () => { els.error.textContent = 'Location permission denied — search a city instead.'; els.error.classList.remove('hidden'); }
    );
  });

  loadCityByName('Chennai');
})();
</script>
</body>
